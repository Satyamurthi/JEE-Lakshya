<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JEE Main April 2026 Question Papers | Mathongo</title>
    <meta name="description" content="JEE Main April 2026 Question Papers — quick links to PDFs." />
    <link rel="icon" href="./assets/mathongo-icon.svg" type="image/svg+xml" />

    <style>
      :root {
        --bg: #ffffff;
        --panel: #ffffff;
        --panel-2: #f7f8fb;
        --text: #0f172a;
        --muted: #64748b;
        --stroke: #e5e7eb;
        --shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        --accent: #0075ff;
        --accent-2: #00b7ff;
        --radius: 18px;
        --maxw: 1080px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        color: var(--text);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          "Apple Color Emoji",
          "Segoe UI Emoji";
        background: linear-gradient(180deg, #ffffff 0%, #fbfbfd 55%, #ffffff 100%);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .topnav {
        position: sticky;
        top: 0;
        z-index: 10;
        background: rgba(255, 255, 255, 0.92);
        border-bottom: 1px solid var(--stroke);
      }

      .topnav__inner {
        max-width: var(--maxw);
        margin: 0 auto;
        padding: 14px 18px;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid transparent;
      }

      .brand:focus-visible {
        outline: none;
        border-color: rgba(15, 23, 42, 0.18);
        box-shadow: 0 0 0 4px rgba(0, 117, 255, 0.18);
      }

      .brand__logo {
        height: 28px;
        width: auto;
        max-width: 160px;
        display: block;
      }

      .container {
        max-width: var(--maxw);
        margin: 0 auto;
        padding: 26px 18px 60px;
      }

      .hero {
        padding: 26px 0 18px;
        text-align: center;
      }

      .title {
        margin: 0;
        font-size: clamp(24px, 3.2vw, 40px);
        letter-spacing: -0.02em;
        line-height: 1.1;
      }

      .subtitle {
        margin: 10px auto 0;
        max-width: 62ch;
        font-size: 14px;
        line-height: 1.6;
        color: var(--muted);
      }

      .grid {
        margin-top: 18px;
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 14px;
      }

      .card {
        grid-column: span 6;
        border: 1px solid var(--stroke);
        background: var(--panel);
        border-radius: var(--radius);
        box-shadow: none;
        padding: 16px;
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        min-height: 84px;
      }

      .card__left {
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 0;
      }

      .card__name {
        margin: 0;
        font-size: 16px;
        line-height: 1.25;
        letter-spacing: -0.01em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .card__meta {
        font-size: 12px;
        color: var(--muted);
      }

      .btn {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--stroke);
        background: var(--panel-2);
        color: #0b1220;
        font-weight: 600;
        font-size: 13px;
        letter-spacing: 0.01em;
        cursor: pointer;
        transition:
          transform 120ms ease,
          background 120ms ease,
          border-color 120ms ease;
      }

      .btn:hover {
        transform: translateY(-1px);
        background: #eef2ff;
        border-color: rgba(0, 117, 255, 0.25);
      }

      .btn:active {
        transform: translateY(0px);
      }

      .btn:focus-visible {
        outline: none;
        box-shadow: 0 0 0 4px rgba(0, 117, 255, 0.18);
      }

      .btn__icon {
        display: inline-block;
        font-size: 14px;
        line-height: 1;
        transform: translateY(-0.5px);
        color: rgba(0, 117, 255, 0.95);
      }

      .empty {
        grid-column: 1 / -1;
        border: 1px dashed var(--stroke);
        border-radius: var(--radius);
        padding: 18px;
        color: var(--muted);
        background: var(--panel-2);
      }

      @media (max-width: 820px) {
        .card {
          grid-column: span 12;
        }
      }
    </style>
  </head>
  <body>
    <header class="topnav" role="banner">
      <div class="topnav__inner">
        <div aria-hidden="true"></div>

        <a class="brand" href="https://mathongo.com" aria-label="Go to Mathongo">
          <img class="brand__logo" src="./assets/mathongo.svg" alt="Mathongo logo" />
        </a>

        <div aria-hidden="true"></div>
      </div>
    </header>

    <main class="container" role="main">
      <section class="hero" aria-labelledby="page-title">
        <h1 class="title" id="page-title">JEE Main April 2026 Question Papers</h1>
        <p class="subtitle">
          Official JEE Main Question Papers with <strong>MathonGo</strong> answer keys.
        </p>
      </section>

      <section aria-label="Question papers">
        <div id="papers-grid" class="grid"></div>
      </section>
    </main>

    <script>
      /**
       * Replace the `url` values below with your Google Drive PDF links.
       * Tip: Prefer a direct "open" or "uc" link (not edit view) for best UX.
       */
      const papers = [
        { name: "2 April Shift 1 - with Answer Keys", url: "https://cutt.ly/dtFwtEZ9" },
        { name: "2 April Shift 2 - with Answer Keys", url: "https://cutt.ly/3tFwtIoI" },
        { name: "4 April Shift 1 - with Answer Keys", url: "https://cutt.ly/ttFeffz6" },
        { name: "4 April Shift 2 - with Answer Keys", url: "https://cutt.ly/gtFefksp" },
        { name: "5 April Shift 1 - with Answer Keys", url: "https://cutt.ly/ltFefhrS" },
        { name: "5 April Shift 2 - with Answer Keys", url: "https://cutt.ly/GtFefj6J" },
        { name: "6 April Shift 1 - with Answer Keys", url: "https://cutt.ly/atFekY8P" },
        { name: "6 April Shift 2 - with Answer Keys", url: "https://cutt.ly/0tFekPmx" },
        { name: "8 April Shift 2 - with Answer Keys", url: "https://cutt.ly/ptFtpAVU" },
      ];

      const grid = document.getElementById("papers-grid");

      const isValidUrl = (value) => {
        try {
          if (!value) return false;
          const u = new URL(value);
          return u.protocol === "http:" || u.protocol === "https:";
        } catch {
          return false;
        }
      };

      const render = () => {
        grid.innerHTML = "";

        const validPapers = papers.filter(
          (p) => p && typeof p.name === "string" && p.name.trim().length > 0,
        );

        if (validPapers.length === 0) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent =
            "Papers will appear here once they're uploaded. Please check back shortly.";
          grid.appendChild(empty);
          return;
        }

        for (const paper of validPapers) {
          const card = document.createElement("article");
          card.className = "card";

          const left = document.createElement("div");
          left.className = "card__left";

          const name = document.createElement("h2");
          name.className = "card__name";
          name.title = paper.name;
          name.textContent = paper.name;

          const meta = document.createElement("div");
          meta.className = "card__meta";
          meta.textContent = isValidUrl(paper.url)
            ? "View the official question paper PDF"
            : "PDF coming soon";

          left.appendChild(name);
          left.appendChild(meta);

          const btn = document.createElement("a");
          btn.className = "btn";
          btn.innerHTML =
            '<span>Open PDF</span><span class="btn__icon" aria-hidden="true">↗</span>';

          if (isValidUrl(paper.url)) {
            btn.href = paper.url;
            btn.target = "_blank";
            btn.rel = "noopener noreferrer";
            btn.setAttribute("aria-label", `Open PDF for ${paper.name}`);
          } else {
            btn.href = "#";
            btn.setAttribute("aria-disabled", "true");
            btn.addEventListener("click", (e) => e.preventDefault());
            btn.style.opacity = "0.55";
            btn.style.cursor = "not-allowed";
          }

          card.appendChild(left);
          card.appendChild(btn);
          grid.appendChild(card);
        }
      };

      render();
    </script>
  </body>
</html>
